spring.application.name=DailyManager

# MySQL (env vars can override defaults)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}
spring.datasource.username=${DB_USER:daily_user}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA defaults for local development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
